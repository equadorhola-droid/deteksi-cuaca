<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: url(pemandangan.jpg) no-repeat center center fixed;
        background-size: cover;
       
    }
    .container{
        background-color: rgba(255, 255, 255, 0.85);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 32px  rgba(0,0,0, 0.2);
        text-align: center;
        backdrop-filter: blur(5px);
        width: 90%;
        max-width: 400px;
         border: 2px solid green;
    }
    .search-box{
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
    }
    .keyword{
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
        outline: none;

    }
    .btn-search {
        padding: 10px 20px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.2s;
    }
    .btn-search:hover {
        background-color: #45a049;
    }
    .location{
        margin: 15px 0;
        color: #333;
    }
    .box{
        background-color: rgba(255, 255, 255, 0.9);
        border: 2px solid #4CAF50;
        padding: 20px;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        min-width: 150px;
    }
    .weather-icon{
        width: 64px;
        height: 64px;

    }
    .temp {
        margin: 10px 0 0 0;
        font-size: 2rem;
        color: #222;
    }
    @keyframes fadeOut{
        from {opacity: 1;visibility: visible;}
        to {opacity:0; visibility: hidden;}
    }
    @keyframes  fadeInUp {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1;transform: translateY(0);}
    }
    .loading{
        position: fixed;
        top: 0;
        width: 100%;
        height: 100%;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content:center ;
        z-index: 9999;
        left: 0;
        font-size: 2rem;
        background-color: cadetblue;
        color: white;
        animation: fadeOut 0.5s forwards 1s ;
       
    }
</style>
</head>
<body>
    <div class="loading">
        <h2>LOADING...</h2>
    </div>
    <div class="container">
        <h1>Website Penebak Cuaca</h1>
        <div class="search-box">
            <input type="text" class="keyword" placeholder="Masukan nama kota..." value="">
            <button class="btn-search">Search</button>
            </div>
            <div class="weather-info">
                <h3 class="location" id="loc-name">Bogor, West Java, Indonesia</h3>
                <div class="box">
                    <h1>23.0°C </h1>
                    <p>2026-06-16 19:15</p>
                    <img src="" alt="" class="weather-icon" id="w-icon">
                    
                </div>
             
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
